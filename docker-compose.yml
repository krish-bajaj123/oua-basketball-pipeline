services:
  postgres:
    image: postgres:16
    container_name: usports_postgres
    environment:
      POSTGRES_USER: ${PG_USER:-krish}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-krish123}
      POSTGRES_DB: ${PG_DB:-usports}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-krish} -d ${PG_DB:-usports}"]
      interval: 5s
      timeout: 3s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: usports_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms64m"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: usports_kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"

  scraper:
    build: ./scraper
    image: usports-scraper:latest
    container_name: usports_scraper
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      LOG_LEVEL: INFO
      SCRAPE_DELAY: "1.0"
    profiles: ["run-once"]   # don't start by default; run via `docker compose run scraper`

  consumer:
    build: ./consumer
    image: usports-consumer:latest
    container_name: usports_consumer
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION:            ${AWS_REGION:-us-east-1}
      S3_BUCKET:             ${RAW_BUCKET}
      S3_PREFIX:             raw
    restart: unless-stopped

  spark:
    build: ./spark
    image: usports-spark:latest
    container_name: usports_spark
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION:            ${AWS_REGION:-us-east-1}
      RAW_BUCKET:            ${RAW_BUCKET}
      CURATED_BUCKET:        ${CURATED_BUCKET}
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB:       ${PG_DB:-usports}
      PG_USER:     ${PG_USER:-krish}
      PG_PASSWORD: ${PG_PASSWORD:-krish123}
    profiles: ["run-once"]

  api:
    build: ./api
    image: usports-api:latest
    container_name: usports_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB:       ${PG_DB:-usports}
      PG_USER:     ${PG_USER:-krish}
      PG_PASSWORD: ${PG_PASSWORD:-krish123}
      CORS_ORIGINS: "*"
    ports: ["8000:8000"]
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    image: usports-dashboard:latest
    container_name: usports_dashboard
    depends_on: [api]
    ports: ["8080:80"]
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.10.2-python3.11
    container_name: usports_airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER:-krish}:${PG_PASSWORD:-krish123}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports: ["8081:8080"]
    command: standalone
    profiles: ["airflow"]

volumes:
  pgdata:
